<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VAYU 3.0 | Neural Interface</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23a855f7' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M2 9h4V4'/><path d='M22 9h-4V4'/><path d='M12 2v20'/><path d='M6 13c0 3.3 2.7 6 6 6s6-2.7 6-6'/></svg>">
    
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg: #000; --purple: #a855f7; --neon-pink: #ff0077; --neon-blue: #00d4ff; --neon-green: #00ff88; --glass: rgba(15, 15, 20, 0.85);
        }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; display: flex; height: 100vh; overflow: hidden; }

        /* SIDEBAR */
        .sidebar { width: 280px; background: #000; padding: 30px; border-right: 1px solid #111; display: flex; flex-direction: column; z-index: 100; transition: 0.3s; }
        .vayu-text { font-size: 26px; font-weight: 800; letter-spacing: 2px; color: var(--purple); text-transform: uppercase; margin-bottom: 40px; }
        .sector-btn { 
            background: transparent; border: none; color: #777; padding: 14px; border-radius: 12px; 
            display: flex; align-items: center; gap: 15px; cursor: pointer; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); width: 100%;
        }
        .sector-btn:hover { color: #fff; background: rgba(255,255,255,0.05); transform: translateX(10px) scale(1.05); }
        
        #chatHistoryList { flex: 1; overflow-y: auto; margin-top: 20px; }
        .history-item { padding: 12px; margin-bottom: 8px; background: #16161a; border-radius: 8px; cursor: pointer; font-size: 14px; color: #a1a1aa; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; transition: 0.2s; }
        .history-item:hover { background: #1d1d24; color: #fff; }

        /* VIEWPORT */
        .viewport { flex: 1; display: flex; flex-direction: column; position: relative; background: radial-gradient(circle at 50% 120%, #150a24 0%, #000 60%); width: 100%; }
        #chat-container { flex: 1; overflow-y: auto; padding: 40px 15%; display: flex; flex-direction: column; gap: 30px; scroll-behavior: smooth; }

        /* HERO STAGE */
        .hero-stage { text-align: center; margin-top: 5vh; }
        .central-logo { width: 85px; height: 85px; margin-bottom: 25px; filter: drop-shadow(0 0 15px var(--purple)); transition: all 0.6s ease; }
        @keyframes neuralSpin { 0% { transform: rotateY(0deg); } 100% { transform: rotateY(360deg); } }
        .neural-spinning { animation: neuralSpin 1.5s linear infinite; filter: drop-shadow(0 0 35px var(--purple)) brightness(1.3) !important; }
        .glow-word { font-family: serif; font-style: italic; font-weight: 700; background: linear-gradient(90deg, var(--purple), var(--neon-blue)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* CHIPS */
        @keyframes bounceWobble { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        .dynamic-ui { display: flex; flex-direction: column; align-items: center; gap: 15px; margin-bottom: 35px; }
        .suggestion-row { display: flex; gap: 12px; }
        .shiny-wobble { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); color: #aaa; padding: 12px 22px; border-radius: 25px; cursor: pointer; backdrop-filter: blur(10px); transition: 0.3s; animation: bounceWobble 4s ease-in-out infinite; }
        .shiny-wobble:nth-child(even) { animation-delay: 2s; }
        .shiny-wobble:hover { background: rgba(255, 255, 255, 0.12); color: #fff; transform: scale(1.1); border-color: var(--purple); animation-play-state: paused; }

        /* INPUT AREA */
        .interaction-zone { width: 100%; max-width: 850px; margin: 0 auto; padding-bottom: 40px; position: relative; z-index: 10; }
        .ambient-glow { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); width: 110%; height: 180px; background: radial-gradient(circle, rgba(168, 85, 247, 0.3) 0%, transparent 75%); filter: blur(50px); pointer-events: none; z-index: 0; }
        .input-island { position: relative; z-index: 1; background: var(--glass); border-radius: 28px; padding: 25px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(25px); box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        textarea { width: 100%; background: transparent; border: none; color: #fff; font-size: 19px; outline: none; resize: none; font-family: inherit; }
        .island-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 12px; }
        .send-pill { background: transparent; border: 1px solid var(--purple); color: var(--purple); width: 50px; height: 50px; border-radius: 16px; cursor: pointer; transition: 0.4s; display: flex; align-items: center; justify-content: center; }
        .send-pill:hover { background: var(--purple); color: #fff; box-shadow: 0 0 20px var(--purple); transform: scale(1.1) rotate(5deg); }

        /* MESSAGES */
        .message.user { align-self: flex-end; background: #111; padding: 18px 25px; border-radius: 22px 22px 0 22px; border: 1px solid #222; max-width: 80%; margin-bottom: 10px; word-wrap: break-word;}
        .message.bot { align-self: flex-start; color: #eee; line-height: 1.8; max-width: 85%; background: rgba(255,255,255,0.03); padding: 22px; border-radius: 18px; border-left: 3px solid var(--purple); margin-bottom: 10px; word-wrap: break-word;}

        /* MOBILE FIXES */
        @media (max-width: 768px) {
            .sidebar { position: absolute; left: -280px; height: 100%; }
            #chat-container { padding: 40px 5%; }
            .suggestion-row { flex-wrap: wrap; justify-content: center; }
            .shiny-wobble { font-size: 13px; padding: 10px 15px; }
            h1 { font-size: 24px; }
        }
    </style>
</head>
<body>
    <button class="hamburger" id="menuBtn">
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
</button>
    <aside class="sidebar" id="mainSidebar">
        <span class="vayu-text">VAYU 3.0</span>
        <button style="background:transparent; border:1px solid var(--purple); color:#fff; padding:12px; border-radius:12px; cursor:pointer; margin-bottom:30px" onclick="location.reload()">+ New Chat</button>
        <nav>
            <button class="sector-btn" onclick="runExample('Provide a detailed medical summary for: ')"><i data-lucide="heart-pulse" style="stroke:var(--neon-pink)"></i> Medical Advice</button>
            <button class="sector-btn" onclick="runExample('What are the top daily news headlines today? ')"><i data-lucide="newspaper" style="stroke:var(--neon-green)"></i> Daily Newspaper</button>
            <button class="sector-btn" onclick="runExample('Explain this concept like a homework guide: ')"><i data-lucide="book-open" style="stroke:var(--neon-blue)"></i> Homework Guide</button>
        </nav>
        <div id="chatHistoryList"></div>
    </aside>

    <main class="viewport">
        <div id="chat-container">
            <div class="hero-stage" id="welcomeHub">
                <svg class="central-logo" id="centralLogo" viewBox="0 0 24 24" fill="none" stroke="#a855f7" stroke-width="2">
                    <path d="M2 9h4V4"/><path d="M22 9h-4V4"/><path d="M12 2v20"/><path d="M6 13c0 3.3 2.7 6 6 6s6-2.7 6-6"/>
                </svg>
                <h1>Visualize <span class="glow-word">Everything</span>.</h1>
            </div>
        </div>

        <div class="interaction-zone">
            <div class="ambient-glow"></div>
            <div id="dynamicUI" class="dynamic-ui">
                <div class="suggestion-row">
                    <button class="shiny-wobble" onclick="runExample('How does photosynthesis work?')">How does photosynthesis work?</button>
                    <button class="shiny-wobble" onclick="runExample('World population status 2026?')">World population status?</button>
                </div>
                <div class="suggestion-row">
                    <button class="shiny-wobble" onclick="runExample('Create a project flowchart.')">Create a Flowchart</button>
                    <button class="shiny-wobble" onclick="runExample('Timeline of internet evolution.')">Generate a Timeline</button>
                </div>
            </div>

            <div class="input-island">
                <textarea id="userInput" placeholder="Synthesize query..." rows="1"></textarea>
                <div class="island-footer">
                    <div style="display:flex; gap:20px; align-items: center;">
                        <label style="cursor:pointer; display:flex; align-items:center">
                            <i data-lucide="plus" style="stroke:var(--purple)"></i>
                            <input type="file" id="fileSync" style="display:none" onchange="handleFileUpload(this)">
                        </label>
                        <i data-lucide="mic" id="micBtn" style="stroke:var(--neon-pink); cursor:pointer"></i>
                    </div>
                    <button class="send-pill" id="sendBtn"><i data-lucide="send"></i></button>
                </div>
            </div>
        </div>
    </main>
    <script src="main.js"></script>
    <script>lucide.createIcons();</script>
    <script src="api_config.js"></script>
<script src="main.js"></script>
</body>
</html>
